# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable the H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Hibernate / JPA config ---
# Auto-creates/updates the schema from the @Entity classes on startup.
# (use "validate" or Flyway/Liquibase migrations in real production apps)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Show the generated SQL in the console - useful for seeing exactly what
# Spring Data JPA / Hibernate is doing under the hood.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.port=8080

# Ensures data.sql runs AFTER Hibernate creates the schema (needed since we
# use ddl-auto=update instead of a separate schema.sql).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

