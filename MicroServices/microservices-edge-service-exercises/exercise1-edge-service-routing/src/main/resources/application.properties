server.port=8080
spring.application.name=exercise1-edge-service-routing

# Route: any request to /example/** is forwarded to httpbin.org
# (httpbin.org is a free public test API - swap the uri for your own service)
spring.cloud.gateway.routes[0].id=example_route
spring.cloud.gateway.routes[0].uri=https://httpbin.org
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

logging.level.com.example.exercise1=INFO
logging.level.org.springframework.cloud.gateway=INFO

management.endpoints.web.exposure.include=gateway,health,info
