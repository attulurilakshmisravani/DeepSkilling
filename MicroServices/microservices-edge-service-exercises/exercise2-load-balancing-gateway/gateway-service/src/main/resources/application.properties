server.port=8080
spring.application.name=gateway-service

# Route: requests to /loadbalanced/** are load-balanced across all
# instances registered under the "example-service" name (the "lb://" scheme
# tells Spring Cloud Gateway to resolve the host through the LoadBalancer).
spring.cloud.gateway.routes[0].id=load_balanced_route
spring.cloud.gateway.routes[0].uri=lb://example-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/loadbalanced/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Static service instance list (stands in for a real discovery server like
# Eureka/Consul). Start two backend-service instances on 8081 and 8082,
# and the load balancer will pick between them for every request.
spring.cloud.discovery.client.simple.instances.example-service[0].uri=http://localhost:8081
spring.cloud.discovery.client.simple.instances.example-service[1].uri=http://localhost:8082

management.endpoints.web.exposure.include=gateway,health,info
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.cloud.loadbalancer=INFO
