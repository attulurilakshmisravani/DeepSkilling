server.port=8080
spring.application.name=gateway-service

# Route: /flaky is protected by the "exampleCircuitBreaker" - if it opens
# (or the call times out), the request is redirected to /fallback/flaky.
spring.cloud.gateway.routes[0].id=resilient_route
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/flaky
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=exampleCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/flaky

# Pass-through route so /toggle-failure and /slow on the backend can be
# reached directly through the gateway too (handy for manual testing).
spring.cloud.gateway.routes[1].id=backend_passthrough
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/toggle-failure,/slow

resilience4j.circuitbreaker.instances.exampleCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failureRateThreshold=50

management.endpoints.web.exposure.include=gateway,health,info,circuitbreakers
management.health.circuitbreakers.enabled=true
logging.level.org.springframework.cloud.gateway=INFO
logging.level.io.github.resilience4j=INFO
