server:
  port: 8080

spring:
  application:
    name: exercise1-oauth2-oidc-login
  security:
    oauth2:
      client:
        registration:
          # "google" is one of Spring Security's built-in providers
          # (CommonOAuth2Provider), so we only need to supply the
          # client-id/secret - the authorization/token/userinfo URIs and
          # scopes are already known to Spring Security.
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-client-secret}
            scope:
              - openid
              - profile
              - email

logging:
  level:
    org.springframework.security: INFO
